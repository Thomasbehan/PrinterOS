# FLSUN Q5 — base Klipper config (MKS Robin Nano v1.2 / STM32F103).
#
# SEED ONLY. Calibrated values (delta endstops, delta_radius, PID, mesh, probe
# z_offset) are written by SAVE_CONFIG into a writable include managed by
# printeros (see modules/printeros/printer-stack.nix). Do not hand-tune the
# placeholders below — run the calibration flows and let SAVE_CONFIG own them.
#
# Pins verified against Klipper's official printer-flsun-q5-2020.cfg.
#
# BRING-UP SAFETY:
#   * First connect: confirm extruder + bed read room temperature BEFORE heating.
#   * First home: keep a hand on the power switch. If a tower drives the wrong way
#     it will travel away from its endstop — cut power and invert that dir_pin.

[mcu]
# Rewritten at boot by printeros printer-detect to the resolved by-id path.
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: delta
max_velocity: 200
max_accel: 3000
max_z_velocity: 200
minimum_z_position: -5
delta_radius: 107.5
print_radius: 100

[stepper_a]
step_pin: PE3
dir_pin: PE2
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: PA15
homing_speed: 20
position_endstop: 220
arm_length: 215

[stepper_b]
step_pin: PE0
dir_pin: PB9
enable_pin: !PE1
microsteps: 16
rotation_distance: 40
endstop_pin: PA12

[stepper_c]
step_pin: PB5
dir_pin: PB4
enable_pin: !PB8
microsteps: 16
rotation_distance: 40
endstop_pin: PC4

[extruder]
step_pin: PD6
dir_pin: !PD3
enable_pin: !PB3
microsteps: 16
rotation_distance: 22.17
gear_ratio: 66:22
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC3
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
control: pid
pid_Kp: 14.529
pid_Ki: 0.557
pid_Kd: 94.802
min_temp: 0
max_temp: 250

[heater_bed]
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
control: pid
pid_Kp: 325.10
pid_Ki: 63.35
pid_Kd: 417.10
min_temp: 0
max_temp: 130

[fan]
pin: PB1

[probe]
# Q5 stock effector probe — kept (superior to a BLTouch on a delta).
pin: PA11
z_offset: 20.26
speed: 5

[delta_calibrate]
radius: 90

[virtual_sdcard]
path: /var/lib/printeros/klipper/gcodes

[pause_resume]
[display_status]

# printeros keeps SAVE_CONFIG output in a separate writable file; see printer-stack.nix.
