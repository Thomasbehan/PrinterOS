# FLSUN Q5 macros. Kept printer-specific; shared macro logic that applies to every
# printer belongs in printers/_common.nix instead (DRY).

[gcode_macro START_PRINT]
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(210)|float %}
    M140 S{BED}                    ; start bed heating
    G28                            ; home all towers
    M190 S{BED}                    ; wait for bed
    M109 S{HOTEND}                 ; wait for hotend
    G92 E0
    G1 Z15 F300

[gcode_macro END_PRINT]
gcode:
    M104 S0
    M140 S0
    M106 S0
    G91
    G1 E-4 F2700                   ; small retract
    G90
    G1 Z150 F1500                  ; drop the bed / raise effector clear of the part
    M84                            ; motors off

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    END_PRINT
    CANCEL_PRINT_BASE

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
    {% set Z = params.Z|default(15)|float %}
    PAUSE_BASE
    G91
    G1 E-2 F2700                   ; retract to stop ooze
    G1 Z{Z} F900                   ; lift (delta: effector up)
    G90
    G1 X0 Y0 F6000                 ; park over centre

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
    G91
    G1 E2 F2700                    ; de-retract
    G90
    RESUME_BASE

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set T = params.TEMP|default(210)|float %}
    M109 S{T}
    G91
    G1 E5 F300                     ; tip shaping
    G1 E-50 F1000                  ; pull out
    G90

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set T = params.TEMP|default(210)|float %}
    M109 S{T}
    G91
    G1 E50 F300                    ; feed to nozzle
    G90

# Slicer-issued filament change (M600) → pause + unload, swap, then RESUME.
[gcode_macro M600]
gcode:
    PAUSE
    UNLOAD_FILAMENT
