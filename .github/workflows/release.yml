name: release

# CD — releases happen ONLY on main, always. Conventional-commit messages drive the
# semantic version (feat → minor, fix → patch, feat!/BREAKING CHANGE → major). Every
# main push builds the FLSUN Q5 firmware AND the Raspberry Pi SD image, then
# semantic-release cuts a versioned GitHub release with both attached (when there are
# releasable commits).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  # TODO: pin to a Klipper commit SHA for full reproducibility.
  KLIPPER_REF: master

jobs:
  firmware:
    name: Build FLSUN Q5 firmware (Robin Nano v1.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi python3
      - name: Checkout Klipper
        uses: actions/checkout@v4
        with:
          repository: Klipper3d/klipper
          ref: ${{ env.KLIPPER_REF }}
          path: klipper
      - name: Configure firmware
        run: |
          cp firmware/flsun-q5-robin-nano-v12.config klipper/.config
          make -C klipper olddefconfig
      - name: Assert config is correct (fail on silent drift)
        working-directory: klipper
        run: |
          for sym in CONFIG_MACH_STM32F103 CONFIG_STM32_FLASH_START_7000 \
                     CONFIG_STM32_CLOCK_REF_8M CONFIG_STM32_SERIAL_USART3; do
            if ! grep -q "^${sym}=y" .config; then
              echo "::error::${sym} is not set — refusing to build a possibly-wrong firmware"
              cat .config; exit 1
            fi
          done
      - name: Build
        run: make -C klipper -j"$(nproc)"
      - name: Patch for MKS Robin bootloader (both names)
        run: |
          mkdir -p artifacts
          python3 klipper/scripts/update_mks_robin.py klipper/out/klipper.bin artifacts/Robin_nano.bin
          cp artifacts/Robin_nano.bin artifacts/Robin_nano35.bin
      - uses: actions/upload-artifact@v4
        with:
          name: flsun-q5-firmware
          path: artifacts/
          if-no-files-found: error

  image:
    name: Build Raspberry Pi 4B SD image (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-image-${{ hashFiles('**/*.nix', 'ui/static/**') }}
          restore-prefixes-first-match: nix-image-
          gc-max-store-size: 8G
      - name: Build SD image
        run: |
          n=0
          until nix build .#sd-image -L --accept-flake-config --show-trace; do
            n=$((n+1)); [ $n -ge 3 ] && { echo "::error::image build failed after $n attempts"; exit 1; }
            echo "::warning::transient build/substituter failure — retry $n"; sleep 20
          done
      - name: Collect image
        run: |
          mkdir -p artifacts
          find -L result -type f \( -name '*.img.zst' -o -name '*.img' \) -exec cp -L {} artifacts/ \;
          ls -lh artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: rpi4b-sd-image
          path: artifacts/
          if-no-files-found: error

  release:
    name: Semantic release (main only)
    needs: [firmware, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Stage release assets
        run: |
          mkdir -p artifacts
          cp dl/flsun-q5-firmware/Robin_nano*.bin artifacts/
          cp dl/rpi4b-sd-image/*.img* artifacts/
          ( cd artifacts && sha256sum Robin_nano*.bin *.img* > SHA256SUMS.txt )
          ls -lh artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
